{% extends "base.html" %}
{% block title %}{% if form.instance.pk %}编辑题目{% else %}创建题目{% endif %} - 编程学习系统{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{% if form.instance.pk %}编辑题目{% else %}创建题目{% endif %}</h1>
    <a href="{% url 'teacher_question_list' %}" class="btn btn-outline">返回题库</a>
</div>

<div class="card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="{% url 'teacher_question_list' %}" class="btn btn-outline">取消</a>
        </div>
    </form>
</div>
{% endblock %}
